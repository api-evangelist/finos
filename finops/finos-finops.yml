specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: FINOS
providerId: finos
publisherName: Fintech Open Source Foundation (FINOS) — a Linux Foundation project
serviceCategory: Open Source Foundation / Standards Body
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Financial Services
  - Fintech
  - Linux Foundation
  - Open Source
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for FINOS: the standards (FDC3, CDM, CCC, Morphir, Symphony API Spec)
  are open source and free at the API/spec layer; FINOS itself is funded through corporate membership
  fees ($200K Platinum / $50K Gold / $10K-$30K Silver / Free Associate) plus Linux Foundation membership.
  FinOps for a FINOS consumer therefore tracks (a) implementation cost of adopting the standards and
  (b) optional membership spend if the organization wants governance influence; there is no per-call
  API meter.'
sources:
  - https://www.finos.org/membership
  - https://www.finos.org/projects
principles:
  - name: Visibility
    description: Track FINOS membership invoice (annual) and Linux Foundation corporate membership invoice;
      track engineering effort spent adopting / contributing to FINOS standards (FDC3, CDM, CCC, Morphir).
  - name: Allocation
    description: Allocate membership cost to corporate-strategy / open-source-program-office budget; allocate
      adoption engineering time to the consuming product line (e.g. trading desktop adopting FDC3).
  - name: Optimization
    description: Combine FINOS Silver/Gold tiers with Linux Foundation membership to maximize governance
      voice for the spend; contribute upstream to standards your firm depends on (reduces in-house maintenance
      burden); reuse existing FINOS reference implementations rather than building proprietary equivalents.
  - name: Accountability
    description: Open-source program office / corporate strategy owns membership tier; engineering leads
      on each implementing product own adoption and contribution decisions; annual review of membership
      ROI.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Budgeting
      - Benchmarking
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
billingModel:
  pricingCategory: Free Open Source + Optional Annual Membership
  billingFrequency: Annual (membership only)
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: FINOS
  ServiceCategory: Open Source Foundation / Standards Body
  ProviderName: FINOS
  PublisherName: Fintech Open Source Foundation (FINOS)
  InvoiceIssuerName: The Linux Foundation
  PricingCategory: Free Open Source + Membership
  PricingUnit: membership-year
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: membership_tier
    description: FINOS membership tier (Platinum / Gold / Silver / Associate).
    unit: membership-year
    aggregation: max
    dimensions:
      - tier
      - company_size
  - name: contribution_hours
    description: Engineering / committer hours contributed upstream to FINOS projects.
    unit: hour
    aggregation: sum
    dimensions:
      - project
      - team
apis:
  - name: FDC3
    serviceName: FDC3
    serviceCategory: Standard
  - name: Common Domain Model
    serviceName: Common Domain Model
    serviceCategory: Standard
  - name: Common Cloud Controls
    serviceName: Common Cloud Controls
    serviceCategory: Standard
  - name: Morphir
    serviceName: Morphir
    serviceCategory: Standard
  - name: Symphony API Spec
    serviceName: Symphony API Spec
    serviceCategory: Specification
unitEconomics:
  - name: Cost per Implementing Product
    metric: (membership_fee + adoption_engineering_cost) / implementing_products
    target: organization-dependent
  - name: Contribution / Membership ROI
    metric: contribution_hours / membership_fee
    target: maximize meaningful contribution
maintainers:
