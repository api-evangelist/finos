aid: finos
name: FINOS
description: The Fintech Open Source Foundation (FINOS) is a Linux Foundation project dedicated to open source innovation
  in the financial services industry. It fosters collaboration between banks, fintech companies, and technology firms on standards
  and projects spanning desktop interoperability (FDC3), financial product modeling (Common Domain Model), cloud compliance
  (Common Cloud Controls), business and technology modeling (Morphir), and messaging APIs (Symphony API Spec), among others.
type: Index
position: Consumer
access: 3rd-Party
