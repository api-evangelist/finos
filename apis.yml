- aid: finos:common-domain-model
  name: Common Domain Model
  description: The Common Domain Model (CDM) is a standardized, machine-readable, and machine-executable model that represents
    financial products, trades in those products, and the lifecycle events of those trades.
  humanURL: https://www.finos.org/common-domain-model
  tags:
  - Common Domain Model
  - Financial Products
  - Open Standard
  - Trade Lifecycle
  properties:
  - type: Documentation
    url: https://cdm.finos.org/
