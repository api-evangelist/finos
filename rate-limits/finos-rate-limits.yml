specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: FINOS
providerId: finos
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Financial Services
  - Fintech
  - Linux Foundation
  - Open Source
  - Rate Limiting
description: FINOS publishes open standards and OpenAPI specifications (FDC3, CDM, CCC, Morphir, Symphony
  API Spec) but does not operate a hosted API service for the standards themselves. There are no FINOS-imposed
  rate limits — only those of any reference server an implementer chooses to host. The Symphony API Spec
  describes the Symphony platform's APIs (Pod, Agent, Authenticator); rate limits there are governed
  by Symphony's own deployment, not FINOS.
notes: FINOS does not host the APIs whose specifications it stewards; rate limits depend on the implementer
  / vendor (e.g. Symphony Communication Services for the Symphony API Spec).
sources:
  - https://www.finos.org/projects
  - https://github.com/finos/symphony-api-spec
limits:
  - name: FDC3 Desktop Agent
    scope: implementer
    metric: varies
    limit: governed by the desktop agent vendor (no FINOS-imposed limit)
  - name: Symphony Pod / Agent / Authenticator API
    scope: deployment
    metric: varies
    limit: governed by Symphony Communication Services for the customer's pod (no FINOS-imposed limit)
    notes: Refer to Symphony's own platform documentation for current per-pod rate ceilings.
  - name: CDM / CCC / Morphir
    scope: implementer
    metric: varies
    limit: standards / libraries — no hosted API surface; no rate limit
policies:
  - name: Standards-only stewardship
    description: FINOS stewards specifications, not hosted services. Rate limits live with the implementer
      / vendor that operates the API endpoint.
  - name: GitHub-hosted artifacts
    description: Specs and reference implementations live on github.com/finos under permissive open-source
      licenses; consumers should clone / fork rather than depend on a FINOS-hosted endpoint.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
