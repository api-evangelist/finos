specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: FINOS
providerId: finos
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Financial Services
  - Fintech
  - Linux Foundation
  - Open Source
description: 'FINOS (Fintech Open Source Foundation) is a Linux Foundation project. The standards and
  reference implementations it stewards — FDC3, Common Domain Model (CDM), Common Cloud Controls (CCC),
  Morphir, and the Symphony API Spec — are open source under permissive licenses (Apache 2.0 / CDLA),
  and there is no per-call API charge. FINOS itself monetizes through corporate membership: Platinum
  ($200,000/yr), Gold ($50,000/yr), Silver ($10,000–$30,000/yr by company size), and Associate (free
  for non-profits, government, academic). FINOS membership requires a separate Linux Foundation corporate
  membership.'
sources:
  - https://www.finos.org/membership
  - https://www.finos.org/projects
plans:
  - id: finos-open-source
    name: Open Source (FDC3, CDM, CCC, Morphir, Symphony API Spec)
    type: freemium
    description: All FINOS standards and reference implementations are free to use under their respective
      open-source licenses; no membership required to consume the specs or build implementations.
    entries:
      - label: Open source consumption
        description: Use of FINOS specifications and reference implementations.
        name: open_source_use
        type: quota
        metric: usage
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: FDC3 specification
      - name: Common Domain Model (CDM)
      - name: Common Cloud Controls (CCC)
      - name: Morphir
      - name: Symphony API Spec (OpenAPI)
      - name: Apache 2.0 / CDLA licenses
  - id: finos-associate
    name: Associate Member
    type: freemium
    description: Free membership for non-profits, government agencies, regulatory bodies, and academic
      institutions. Includes free event attendance and marketing participation opportunities.
    entries:
      - label: Associate membership
        description: Free for eligible organizations.
        name: associate_membership
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Free for non-profits / government / regulators / academia
      - name: Free event attendance
      - name: Marketing participation
  - id: finos-silver
    name: Silver Member
    type: subscription
    description: 'Silver membership tier. Annual fee scales by company size: $10,000 (under 20 employees),
      $20,000 (20–99), $30,000 (100+). Includes one governing board vote.'
    entries:
      - label: Silver membership (under 20 employees)
        description: Annual fee for organizations under 20 employees.
        name: silver_small
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '10000.00'
        userMultiplied: false
      - label: Silver membership (20–99 employees)
        description: Annual fee for organizations 20–99 employees.
        name: silver_mid
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '20000.00'
        userMultiplied: false
      - label: Silver membership (100+ employees)
        description: Annual fee for organizations 100+ employees.
        name: silver_large
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '30000.00'
        userMultiplied: false
    elements:
      - name: Vote for one governing board member
      - name: Event positioning opportunities
      - name: Linux Foundation corporate membership required separately
  - id: finos-gold
    name: Gold Member
    type: subscription
    description: Gold membership tier ($50,000/yr). Vote in elections for up to five governing board members.
    entries:
      - label: Gold membership
        description: Annual Gold membership fee.
        name: gold_membership
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '50000.00'
        userMultiplied: false
    elements:
      - name: Vote for up to five governing board members
      - name: Event positioning + marketing opportunities
      - name: Linux Foundation corporate membership required separately
  - id: finos-platinum
    name: Platinum Member
    type: subscription
    description: Top membership tier ($200,000/yr). Appoint one FINOS governing board member; premium
      event positioning and marketing visibility.
    entries:
      - label: Platinum membership
        description: Annual Platinum membership fee.
        name: platinum_membership
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '200000.00'
        userMultiplied: false
    elements:
      - name: Appoint one FINOS governing board member
      - name: Premium event positioning
      - name: Premium marketing visibility
      - name: Linux Foundation corporate membership required separately
maintainers:
