          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: IM streamId
          required: true
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
    - name: v1-im-id-update
      path: /v1/im/{id}/update
      operations:
      - name: post
        method: POST
        description: Update the attributes of an existing IM.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: IM streamID
          required: true
        - name: payload
          in: body
          type: string
          required: true
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
    - name: v1-room-id-setActive
      path: /v1/room/{id}/setActive
      operations:
      - name: post
        method: POST
        description: Deactivate or reactivate a chatroom. At creation, a new chatroom is active.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Room streamId
          required: true
        - name: active
          in: query
          type: boolean
          required: true
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
    - name: v1-streams-list
