          required: true
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
    - name: v3-room-create
      path: /v3/room/create
      operations:
      - name: post
        method: POST
        description: Create a new chatroom.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
