        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uid
          in: path
          type: integer
          description: User ID as a decimal integer
          required: true
        - name: local
          in: query
          type: boolean
          description: If true, a local query will be performed and the presence will be
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
