          in: header
          type: string
          description: Session authentication token.
          required: true
      - name: post
        method: POST
        description: Set the presence of the requesting user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: soft
          in: query
          type: boolean
          description: If true, the user's current status is taken into consideration. If the user is currently OFFLINE,
        - name: presence
          in: body
          type: string
          required: true
    - name: v2-users-presence
      path: /v2/users/presence
      operations:
      - name: get
        method: GET
        description: Get presence information about all company (pod) users.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
