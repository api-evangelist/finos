          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: lastUserId
          in: query
          type: integer
          description: Last user ID retrieved. Used for paging; if provided, results will skip users with IDs less than this
            parameter.
        - name: limit
          in: query
          type: integer
          description: Max number of records to return. If no value is provided, 1000 is the default. The maximum supported
            value is 5000.
    - name: v3-user-presence
      path: /v3/user/presence
      operations:
      - name: post
        method: POST
        description: Set presence information for a particular user.
        outputRawFormat: json
        outputParameters:
