      operations:
      - name: post
        method: POST
        description: Create Presence status feed.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
    - name: v1-presence-feed-feedId-delete
      path: /v1/presence/feed/{feedId}/delete
      operations:
      - name: post
        method: POST
        description: Delete a presence status feed.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: feedId
          in: path
          type: string
          description: Presence feed ID.
          required: true
