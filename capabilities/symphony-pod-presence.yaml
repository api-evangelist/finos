      path: /v1/user/presence/register
      operations:
      - name: post
        method: POST
        description: Register interest in a user's presence status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: uidList
          in: body
          type: string
          description: List of (integer) User IDs of users whose presence to query
          required: true
