          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: soft
          in: query
          type: boolean
          description: If true, the user's current status is taken into consideration. If the user is currently OFFLINE,
        - name: presence
          in: body
          type: string
          required: true
    - name: v3-user-uid-presence
      path: /v3/user/{uid}/presence
      operations:
      - name: get
        method: GET
        description: Get presence information about a particular user.
