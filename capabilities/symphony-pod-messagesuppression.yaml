naftiko: 1.0.0-alpha2
info:
  label: Pod API — MessageSuppression
  description: 'Pod API — MessageSuppression. 1 operations. Lead operation: Suppress a message. Self-contained Naftiko capability
    covering one Finos business surface.'
  tags:
  - Finos
  - MessageSuppression
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FINOS_API_KEY: FINOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: symphony-pod-messagesuppression
    baseUri: https://yourpodURL.symphony.com/pod
    description: Pod API — MessageSuppression business capability. Self-contained, no shared references.
    resources:
    - name: v1-admin-messagesuppression-id-suppress
      path: /v1/admin/messagesuppression/{id}/suppress
      operations:
      - name: post
        method: POST
        description: Suppress a message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: URL-Safe encoded Message ID
          required: true
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
  exposes:
  - type: rest
    namespace: symphony-pod-messagesuppression-rest
    port: 8080
    description: REST adapter for Pod API — MessageSuppression. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/admin/messagesuppression/{id}/suppress
      name: v1-admin-messagesuppression-id-suppress
      description: REST surface for v1-admin-messagesuppression-id-suppress.
      operations:
      - method: POST
        name: post
        description: Suppress a message
        call: symphony-pod-messagesuppression.post
        with:
          id: rest.id
          sessionToken: rest.sessionToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: symphony-pod-messagesuppression-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pod API — MessageSuppression. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: suppress-message
      description: Suppress a message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: symphony-pod-messagesuppression.post
      with:
        id: tools.id
        sessionToken: tools.sessionToken
      outputParameters:
      - type: object
        mapping: $.
