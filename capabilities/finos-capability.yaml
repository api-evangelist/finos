        - name: id
          in: path
          type: string
          required: true
          description: The ID of the signal to display.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-signals-create
      path: /v1/signals/create
      operations:
      - name: post-v1-signals-create
        method: POST
        description: Create a signal.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          required: true
