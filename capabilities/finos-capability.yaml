        - name: keyManagerToken
          in: header
          type: string
          description: Key Manager authentication token.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-signals-id-update
      path: /v1/signals/{id}/update
      operations:
      - name: post-v1-signals-id-update
        method: POST
        description: Update a signal.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          required: true
          description: Session authentication token.
        - name: keyManagerToken
          in: header
          type: string
          description: Key Manager authentication token.
        - name: id
          in: path
          type: string
          required: true
          description: The id of the signal.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-signals-id-delete
      path: /v1/signals/{id}/delete
      operations:
      - name: post-v1-signals-id-delete
        method: POST
        description: Delete a signal.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          required: true
          description: Session authentication token.
        - name: keyManagerToken
          in: header
          type: string
          description: Key Manager authentication token.
        - name: id
          in: path
          type: string
          required: true
          description: The id of the signal.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-signals-id-subscribe
      path: /v1/signals/{id}/subscribe
      operations:
      - name: post-v1-signals-id-subscribe
        method: POST
        description: Subscribe to a Signal.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          required: true
          description: Session authentication token.
        - name: keyManagerToken
          in: header
          type: string
          description: Key Manager authentication token.
        - name: id
          in: path
          type: string
          required: true
          description: The id of the signal.
        - name: pushed
          in: query
          type: boolean
          description: Prevent the user to unsubscribe (only for bulk subscription)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-signals-id-unsubscribe
      path: /v1/signals/{id}/unsubscribe
      operations:
      - name: post-v1-signals-id-unsubscribe
        method: POST
        description: Unsubscribe to a Signal.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          required: true
          description: Session authentication token.
        - name: keyManagerToken
          in: header
          type: string
          description: Key Manager authentication token.
        - name: id
          in: path
          type: string
          required: true
          description: The id of the signal.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-signals-id-subscribers
      path: /v1/signals/{id}/subscribers
      operations:
      - name: get-v1-signals-id-subscribers
        method: GET
        description: Get the subscribers of a signal
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          required: true
          description: Session authentication token.
        - name: keyManagerToken
          in: header
          type: string
          description: Key Manager authentication token.
        - name: id
          in: path
          type: string
