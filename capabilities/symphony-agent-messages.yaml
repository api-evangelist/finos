        sid: tools.sid
        since: tools.since
        until: tools.until
        skip: tools.skip
        limit: tools.limit
        sessionToken: tools.sessionToken
        keyManagerToken: tools.keyManagerToken
      outputParameters:
      - type: object
        mapping: $.
    - name: post-message-one-existing-stream
      description: Post a message to one existing stream.
      hints:
        readOnly: false
