  - type: http
    namespace: symphony-agent-violations
    baseUri: ''
    description: Agent API — Violations business capability. Self-contained, no shared references.
    resources:
    - name: v1-dlp-violations-message
      path: /v1/dlp/violations/message
      operations:
      - name: get
        method: GET
        description: Get violations as a result of policy enforcement on messages.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startTime
          in: query
          type: integer
          description: Timestamp of the first required violation.
          required: true
        - name: endTime
          in: query
          type: integer
          description: Timestamp of the last required violation.
        - name: next
          in: query
          type: string
          description: Offset of the next chunk of violations. Value is null for the first request.
        - name: limit
          in: query
          type: integer
          description: Max No. of violations to return. If no value is provided, 50 is the default. The maximum supported
            value is 500.
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: keyManagerToken
          in: header
          type: string
          description: Key Manager authentication token.
