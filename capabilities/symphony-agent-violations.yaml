naftiko: 1.0.0-alpha2
info:
  label: Agent API — Violations
  description: 'Agent API — Violations. 7 operations. Lead operation: Get violations as a result of policy enforcement on
    messages.. Self-contained Naftiko capability covering one Finos business surface.'
  tags:
  - Finos
  - Violations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FINOS_API_KEY: FINOS_API_KEY
capability:
