naftiko: 1.0.0-alpha2
info:
  label: Pod API — Application
  description: 'Pod API — Application. 4 operations. Lead operation: Creates a new app. Self-contained Naftiko capability
    covering one Finos business surface.'
  tags:
  - Finos
  - Application
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FINOS_API_KEY: FINOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: symphony-pod-application
    baseUri: https://yourpodURL.symphony.com/pod
    description: Pod API — Application business capability. Self-contained, no shared references.
    resources:
    - name: v1-admin-app-create
      path: /v1/admin/app/create
      operations:
      - name: post
        method: POST
        description: Creates a new app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: applicationDetail
          in: body
          type: string
          description: Application detail to create the app with
          required: true
    - name: v1-admin-app-id-delete
      path: /v1/admin/app/{id}/delete
      operations:
      - name: post
        method: POST
        description: Deletes a app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: id
          in: path
          type: string
          description: The id of the app
          required: true
    - name: v1-admin-app-id-get
      path: /v1/admin/app/{id}/get
      operations:
      - name: get
        method: GET
        description: Gets a app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: id
          in: path
          type: string
          description: the id of the app to get
          required: true
    - name: v1-admin-app-id-update
      path: /v1/admin/app/{id}/update
      operations:
      - name: post
        method: POST
        description: Updates a app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: id
          in: path
          type: string
          description: Id of the app
          required: true
        - name: applicationDetail
          in: body
          type: string
          description: Details to update the app with
          required: true
  exposes:
  - type: rest
    namespace: symphony-pod-application-rest
    port: 8080
    description: REST adapter for Pod API — Application. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/admin/app/create
      name: v1-admin-app-create
      description: REST surface for v1-admin-app-create.
      operations:
      - method: POST
        name: post
        description: Creates a new app
        call: symphony-pod-application.post
        with:
          sessionToken: rest.sessionToken
          applicationDetail: rest.applicationDetail
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/admin/app/{id}/delete
      name: v1-admin-app-id-delete
      description: REST surface for v1-admin-app-id-delete.
      operations:
      - method: POST
        name: post
        description: Deletes a app
        call: symphony-pod-application.post
        with:
          sessionToken: rest.sessionToken
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/admin/app/{id}/get
      name: v1-admin-app-id-get
      description: REST surface for v1-admin-app-id-get.
      operations:
      - method: GET
        name: get
        description: Gets a app
        call: symphony-pod-application.get
        with:
          sessionToken: rest.sessionToken
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/admin/app/{id}/update
      name: v1-admin-app-id-update
      description: REST surface for v1-admin-app-id-update.
      operations:
      - method: POST
        name: post
        description: Updates a app
        call: symphony-pod-application.post
        with:
          sessionToken: rest.sessionToken
          id: rest.id
          applicationDetail: rest.applicationDetail
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: symphony-pod-application-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pod API — Application. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: creates-new-app
      description: Creates a new app
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: symphony-pod-application.post
      with:
        sessionToken: tools.sessionToken
        applicationDetail: tools.applicationDetail
      outputParameters:
      - type: object
        mapping: $.
    - name: deletes-app
      description: Deletes a app
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: symphony-pod-application.post
      with:
        sessionToken: tools.sessionToken
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: gets-app
      description: Gets a app
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: symphony-pod-application.get
      with:
        sessionToken: tools.sessionToken
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: updates-app
      description: Updates a app
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: symphony-pod-application.post
      with:
        sessionToken: tools.sessionToken
        id: tools.id
        applicationDetail: tools.applicationDetail
      outputParameters:
      - type: object
        mapping: $.
