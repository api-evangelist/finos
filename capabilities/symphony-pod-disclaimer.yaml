naftiko: 1.0.0-alpha2
info:
  label: Pod API — Disclaimer
  description: 'Pod API — Disclaimer. 3 operations. Lead operation: List all disclaimers for the company (pod). Self-contained
    Naftiko capability covering one Finos business surface.'
  tags:
  - Finos
  - Disclaimer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FINOS_API_KEY: FINOS_API_KEY
capability:
  consumes:
  - type: http
    namespace: symphony-pod-disclaimer
    baseUri: https://yourpodURL.symphony.com/pod
    description: Pod API — Disclaimer business capability. Self-contained, no shared references.
    resources:
    - name: v1-admin-disclaimer-list
      path: /v1/admin/disclaimer/list
      operations:
      - name: get
        method: GET
        description: List all disclaimers for the company (pod)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
    - name: v1-admin-disclaimer-did
      path: /v1/admin/disclaimer/{did}
      operations:
      - name: get
        method: GET
        description: Get a disclaimer by disclaimer id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: did
          in: path
          type: string
          description: The ID of the entity
          required: true
    - name: v1-admin-disclaimer-did-users
      path: /v1/admin/disclaimer/{did}/users
      operations:
      - name: get
        method: GET
        description: List all users assigned to this disclaimer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionToken
          in: header
          type: string
          description: Session authentication token.
          required: true
        - name: did
          in: path
          type: string
          description: The ID of the entity
          required: true
  exposes:
  - type: rest
    namespace: symphony-pod-disclaimer-rest
    port: 8080
    description: REST adapter for Pod API — Disclaimer. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/v1/admin/disclaimer/list
      name: v1-admin-disclaimer-list
      description: REST surface for v1-admin-disclaimer-list.
      operations:
      - method: GET
        name: get
        description: List all disclaimers for the company (pod)
        call: symphony-pod-disclaimer.get
        with:
          sessionToken: rest.sessionToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/admin/disclaimer/{did}
      name: v1-admin-disclaimer-did
      description: REST surface for v1-admin-disclaimer-did.
      operations:
      - method: GET
        name: get
        description: Get a disclaimer by disclaimer id
        call: symphony-pod-disclaimer.get
        with:
          sessionToken: rest.sessionToken
          did: rest.did
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/admin/disclaimer/{did}/users
      name: v1-admin-disclaimer-did-users
      description: REST surface for v1-admin-disclaimer-did-users.
      operations:
      - method: GET
        name: get
        description: List all users assigned to this disclaimer
        call: symphony-pod-disclaimer.get
        with:
          sessionToken: rest.sessionToken
          did: rest.did
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: symphony-pod-disclaimer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pod API — Disclaimer. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-disclaimers-company-pod
      description: List all disclaimers for the company (pod)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: symphony-pod-disclaimer.get
      with:
        sessionToken: tools.sessionToken
      outputParameters:
      - type: object
        mapping: $.
    - name: get-disclaimer-disclaimer-id
      description: Get a disclaimer by disclaimer id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: symphony-pod-disclaimer.get
      with:
        sessionToken: tools.sessionToken
        did: tools.did
      outputParameters:
      - type: object
        mapping: $.
    - name: list-all-users-assigned-this
      description: List all users assigned to this disclaimer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: symphony-pod-disclaimer.get
      with:
        sessionToken: tools.sessionToken
        did: tools.did
      outputParameters:
      - type: object
        mapping: $.
